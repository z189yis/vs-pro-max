<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>吸血鬼幸存者 Pro Max</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: #0a0a14; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; position: fixed; inset: 0; }
canvas { display: block; position: absolute; top: 0; left: 0; touch-action: none; }
#hud { position: absolute; top: 0; left: 0; right: 0; padding: 12px 20px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
.hud-item { color: #e0d8c0; font-size: 14px; text-shadow: 0 0 8px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
.hud-item span { color: #ffcc44; font-weight: bold; }
#xp-bar-wrap { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 300px; height: 8px; background: rgba(0,0,0,0.6); border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); overflow: hidden; z-index: 10; pointer-events: none; }
#xp-bar-fill { height: 100%; background: linear-gradient(90deg, #44dd88, #88ff44); border-radius: 4px; transition: width 0.3s; }
#weapons-bar { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; pointer-events: none; }
.weapon-icon { width: 36px; height: 36px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; position: relative; }
.weapon-icon .lv { position: absolute; bottom: -2px; right: -2px; background: #ffcc44; color: #000; font-size: 9px; font-weight: bold; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 1; }
#upgrade-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 100; }
#upgrade-overlay.active { display: flex; }
#upgrade-title { color: #ffcc44; font-size: 28px; font-weight: bold; margin-bottom: 24px; text-shadow: 0 0 20px rgba(255,200,50,0.5); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
#upgrade-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.upgrade-card { width: 180px; padding: 20px 16px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 2px solid rgba(255,255,255,0.2); border-radius: 14px; cursor: pointer; text-align: center; color: #e0d8c0; transition: all 0.2s; }
.upgrade-card:hover { border-color: #ffcc44; transform: translateY(-4px); box-shadow: 0 8px 30px rgba(255,200,50,0.25); }
.upgrade-card .card-icon { font-size: 40px; margin-bottom: 10px; }
.upgrade-card .card-name { font-size: 16px; font-weight: bold; color: #ffcc44; margin-bottom: 4px; }
.upgrade-card .card-level { font-size: 12px; color: #aaa; margin-bottom: 8px; }
.upgrade-card .card-desc { font-size: 11px; color: #aab; line-height: 1.4; }
.upgrade-card .card-new { display: inline-block; background: #ff4444; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; }
#weather-banner { position: absolute; top: 64px; left: 50%; transform: translateX(-50%) translateY(-80px); padding: 10px 28px; background: rgba(20,20,40,0.85); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; color: #ffcc44; font-size: 18px; font-weight: bold; text-shadow: 0 0 12px rgba(255,200,50,0.6); pointer-events: none; z-index: 15; opacity: 0; transition: transform 0.5s ease, opacity 0.5s ease; }
#weather-banner.active { transform: translateX(-50%) translateY(0); opacity: 1; }
@media (max-width: 768px) { #weather-banner { font-size: 14px; padding: 8px 20px; top: 56px; } }
#game-over { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 200; cursor: pointer; }
#game-over.active { display: flex; }
#game-over h1 { color: #ff4444; font-size: 48px; margin-bottom: 16px; text-shadow: 0 0 30px rgba(255,50,50,0.6); }
#game-over .stats { color: #e0d8c0; font-size: 18px; margin: 6px 0; }
#game-over .stats span { color: #ffcc44; }
#game-over .hint { color: #888; font-size: 14px; margin-top: 24px; animation: pulse 1.5s ease-in-out infinite; }
.ctrl-mobile { display: none; }
@media (max-width: 768px), (hover: none) and (pointer: coarse) { .ctrl-desk { display: none; } .ctrl-mobile { display: inline; } }
#title-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 200; }
#title-screen h1 { font-size: 52px; color: #ffcc44; text-shadow: 0 0 40px rgba(255,200,50,0.5), 0 4px 8px rgba(0,0,0,0.8); margin-bottom: 8px; letter-spacing: 4px; }
#title-screen .subtitle { color: #aaa; font-size: 16px; margin-bottom: 32px; letter-spacing: 2px; }
#title-screen .start-btn { padding: 14px 48px; font-size: 20px; background: linear-gradient(135deg, #cc3333, #882222); color: #fff; border: 2px solid #ff6666; border-radius: 10px; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }
#title-screen .start-btn:hover { background: linear-gradient(135deg, #dd4444, #993333); transform: scale(1.05); box-shadow: 0 0 30px rgba(255,50,50,0.4); }
#title-screen .controls { color: #888; font-size: 13px; margin-top: 24px; text-align: center; line-height: 1.8; }
@media (max-width: 768px) { .hud-item { font-size: 12px; padding: 4px 10px; } #xp-bar-wrap { width: 200px; bottom: 30px; } #weapons-bar { bottom: 44px; gap: 4px; } .weapon-icon { width: 30px; height: 30px; font-size: 15px; } .weapon-icon .lv { width: 12px; height: 12px; font-size: 8px; } #upgrade-title { font-size: 22px; margin-bottom: 16px; } #upgrade-cards { gap: 10px; } .upgrade-card { width: 140px; padding: 14px 10px; } .upgrade-card .card-icon { font-size: 30px; } .upgrade-card .card-name { font-size: 14px; } .upgrade-card .card-desc { font-size: 10px; } #title-screen h1 { font-size: 32px; letter-spacing: 2px; } #title-screen .start-btn { padding: 12px 36px; font-size: 18px; } #game-over h1 { font-size: 32px; } #game-over .stats { font-size: 15px; } }
@media (max-width: 400px) { .upgrade-card { width: 110px; padding: 10px 8px; } .upgrade-card .card-icon { font-size: 24px; } .upgrade-card .card-name { font-size: 12px; } .upgrade-card .card-desc { font-size: 9px; } #upgrade-cards { gap: 6px; } #title-screen h1 { font-size: 26px; } }
</style>
</head>
<body>
<canvas id="game" tabindex="0"></canvas>
<div id="hud"><div class="hud-item">🕐 <span id="hud-time">00:00</span></div><div class="hud-item">💀 <span id="hud-kills">0</span></div><div class="hud-item">⭐ Lv.<span id="hud-level">1</span></div><div class="hud-item">❤️ <span id="hud-hp">100</span></div><div id="hud-weather" class="hud-item" title="天气效果">☀️ 晴朗</div></div>
<div id="xp-bar-wrap"><div id="xp-bar-fill" style="width:0%"></div></div>
<div id="weapons-bar"></div>
<div id="weather-banner"></div>
<div id="upgrade-overlay"><div id="upgrade-title">⬆ 选择升级</div><div id="upgrade-cards"></div></div>
<div id="game-over" onclick="if(window.__restartGame)window.__restartGame()"><h1>游戏结束</h1><div class="stats">🕐 生存时间: <span id="go-time">00:00</span></div><div class="stats">💀 击杀数: <span id="go-kills">0</span></div><div class="stats">⭐ 等级: <span id="go-level">1</span></div><div class="hint"><span class="ctrl-desk">按 Enter 重新开始</span><span class="ctrl-mobile">点击屏幕重新开始</span></div></div>
<div id="title-screen"><h1>🧛 吸血鬼幸存者</h1><div class="subtitle">— Pro Max —</div><button class="start-btn" id="btn-start">开始游戏</button><div class="controls"><span class="ctrl-desk">WASD / 方向键 — 移动</span><span class="ctrl-mobile">左侧滑动摇杆 — 移动</span><br>武器自动攻击 · 升级时选择卡片<br>尽可能长时间生存！</div></div>
<script type="module" src="src/main.js"></script>
</body>
</html>
